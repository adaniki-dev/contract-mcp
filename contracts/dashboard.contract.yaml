contract:
  version: "2.0.0"
  feature: dashboard
  description: "Web dashboard que serve relatório humanizado dos contratos via localhost"
  owner: adam
  status: draft

dependencies:
  internal:
    - feature: compiler
      reason: "Precisa dos contratos compilados para mostrar status"
    - feature: validator
      reason: "Precisa dos resultados de validação"
    - feature: indexer
      reason: "Usa o índice para visão geral"
    - feature: dependency-graph
      reason: "Usa detectCommunities e analyzeStructure para colorir nodes por cluster"
    - feature: shared-config
      reason: "Constante DEFAULT_CONTRACTS_DIR"
    - feature: shared-types
      reason: "Tipos DashboardData, FeatureSummary, Contract, ValidationResult"
  external: []

exports:
  functions:
    - name: startDashboard
      signature: "(projectRoot: string) => Promise<Result<{ url: string; port: number; stop: () => void }, DashboardError>>"
      description: "Inicia web server com dashboard em porta disponível a partir de 8000"
      pure: false
    - name: renderDashboard
      signature: "(projectRoot: string) => Promise<Result<string, DashboardError>>"
      description: "Gera HTML do dashboard sem iniciar servidor"
      pure: true
    - name: renderHtml
      signature: "(projectRoot: string) => Promise<Result<string, DashboardError>>"
      description: "Alias para renderDashboard"
      pure: true
  types:
    - name: DashboardData
      description: "Dados agregados para renderização do dashboard"
    - name: FeatureSummary
      description: "Resumo de uma feature para o dashboard"
    - name: DashboardError
      description: "Erro durante geração do dashboard"

types:
  - name: DashboardData
    description: "Dados do dashboard"
    fields:
      - name: project
        type: string
        required: true
        description: "Nome do projeto"
      - name: totalFeatures
        type: number
        required: true
        description: "Total de features"
      - name: totalRules
        type: number
        required: true
        description: "Total de regras"
      - name: totalViolations
        type: number
        required: true
        description: "Total de violações"
      - name: features
        type: "FeatureSummary[]"
        required: true
        description: "Resumo por feature"
  - name: FeatureSummary
    description: "Resumo de uma feature"
    fields:
      - name: feature
        type: string
        required: true
        description: "Slug da feature"
      - name: status
        type: "draft | active | deprecated"
        required: true
        description: "Status do contrato"
      - name: valid
        type: boolean
        required: true
        description: "Se está em conformidade"
      - name: violationsCount
        type: number
        required: true
        description: "Quantidade de violações"
      - name: dependenciesCount
        type: number
        required: true
        description: "Quantidade de dependências"
      - name: rulesCount
        type: number
        required: true
        description: "Quantidade de regras"

rules:
  - id: read-only
    description: "Dashboard nunca modifica contratos — apenas leitura"
    severity: error
    testable: true
  - id: complete-overview
    description: "Dashboard deve mostrar: feature, status, validação pass/fail, deps, rules"
    severity: warning
    testable: true
  - id: auto-port
    description: "Tenta portas a partir de 8000, fallback automático se ocupada"
    severity: error
    testable: true
  - id: human-readable
    description: "Output deve ser legível por humanos via browser sem ferramentas adicionais"
    severity: info
    testable: false

files:
  - path: src/features/dashboard/index.ts
    purpose: "Barrel export público"
  - path: src/features/dashboard/dashboard.ts
    purpose: "Web server + renderização HTML do dashboard"
  - path: src/features/dashboard/dashboard.test.ts
    purpose: "Testes do dashboard"
